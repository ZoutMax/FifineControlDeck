# Cut a GitHub Release when a version tag (v*) is pushed: build the .deb for
# amd64 + arm64 and attach them, with auto-generated release notes.
#
# Usage:  ./release.sh 0.5.3 "what changed"     (tags v0.5.3 and pushes it)
#   -> this workflow fires on the tag and publishes the release.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write        # required to create the release

jobs:
  # The tests-on-push workflow does not fire on tag pushes, so without this
  # gate a tag on a broken commit publishes broken .debs to releases/latest.
  # One Python version is enough here — the matrix already ran on the branch.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install system libraries (Qt runtime + libudev for the transport .so)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libudev1 \
            libglib2.0-0 libfontconfig1 libfreetype6 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxkbcommon-x11-0 fonts-dejavu-core

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 Pillow psutil pyudev ruff pytest pytest-timeout mypy==2.3.0

      - name: Gates (ruff, mypy, tests, smoke)
        env:
          QT_QPA_PLATFORM: offscreen
          QT_LOGGING_RULES: "*=false"
        run: |
          ruff check fifine_deck --exclude fifine_deck/backend --select E9,F63,F7,F82
          mypy fifine_deck
          HOME="$(mktemp -d)" python -m pytest --timeout=60
          python .github/smoke_test.py

  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync dpkg-dev

      - name: Build .deb (amd64 + arm64)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          ./packaging/build-deb.sh "$VERSION" amd64
          ./packaging/build-deb.sh "$VERSION" arm64
          # stable, version-agnostic names so the README's
          # releases/latest/download/... link always resolves to the newest.
          cp "dist/fifine-control-deck_${VERSION}_amd64.deb" dist/fifine-control-deck_amd64.deb
          cp "dist/fifine-control-deck_${VERSION}_arm64.deb" dist/fifine-control-deck_arm64.deb
          ls -la dist/*.deb

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/fifine-control-deck_${VERSION}_amd64.deb" \
            "dist/fifine-control-deck_${VERSION}_arm64.deb" \
            "dist/fifine-control-deck_amd64.deb" \
            "dist/fifine-control-deck_arm64.deb" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
