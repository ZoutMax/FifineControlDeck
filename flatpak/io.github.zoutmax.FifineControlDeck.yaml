# Flatpak / Flathub manifest for fifine Control Deck.
#
# STATUS: scaffold. Before this builds on Flathub you must (see docs/FLATPAK.md):
#   1. Generate pinned, offline pip sources for the python-deps module with
#      flatpak-pip-generator (Flathub builds have no network).
#   2. Test-build locally:  flatpak-builder --user --install --force-clean \
#         build-dir flatpak/io.github.zoutmax.FifineControlDeck.yaml
#   3. Adapt confined actions (host tools: ydotool/playerctl/wpctl/xdg-open) —
#      see the caveats in docs/FLATPAK.md.
#
id: io.github.zoutmax.FifineControlDeck
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: fifine-control-deck

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --socket=pulseaudio               # volume / media actions
  - --share=network                   # open-url and network actions
  - --device=all                      # USB device access (/dev/hidraw*, /dev/bus/usb)
  - --filesystem=xdg-run/pipewire-0:ro
  # Host helper tools (hotkeys/media/open-url) are launched via flatpak-spawn --host:
  - --talk-name=org.freedesktop.Flatpak
  # Media control via MPRIS (playerctl alternative) if adapted:
  - --talk-name=org.mpris.MediaPlayer2.*

modules:
  # --- Python dependencies -------------------------------------------------
  # PyQt6 wheels bundle their own Qt6, so the freedesktop runtime is enough.
  # For Flathub, REPLACE this module with the output of flatpak-pip-generator
  # (pinned wheel URLs + sha256), because Flathub builds are offline.
  - name: python3-deps
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --prefix=${FLATPAK_DEST} PyQt6 Pillow pyudev
    # sources: <-- generated by flatpak-pip-generator; see docs/FLATPAK.md

  # --- Application ---------------------------------------------------------
  - name: fifine-control-deck
    buildsystem: simple
    build-commands:
      - install -d ${FLATPAK_DEST}/lib/fifine-control-deck
      - cp -r fifine_deck assets ${FLATPAK_DEST}/lib/fifine-control-deck/
      # drop non-Linux / other-arch transport binaries
      - find ${FLATPAK_DEST}/lib/fifine-control-deck -type f \( -name '*.dll' -o -name '*.dylib' \) -delete
      - install -Dm755 flatpak/fifine-control-deck.launcher ${FLATPAK_DEST}/bin/fifine-control-deck
      - install -Dm644 flatpak/io.github.zoutmax.FifineControlDeck.desktop
          ${FLATPAK_DEST}/share/applications/io.github.zoutmax.FifineControlDeck.desktop
      - install -Dm644 flatpak/io.github.zoutmax.FifineControlDeck.metainfo.xml
          ${FLATPAK_DEST}/share/metainfo/io.github.zoutmax.FifineControlDeck.metainfo.xml
      - install -Dm644 assets/app/fifine-deck.png
          ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/io.github.zoutmax.FifineControlDeck.png
      - install -Dm644 assets/app/fifine-deck-256.png
          ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/io.github.zoutmax.FifineControlDeck.png
    sources:
      # Flathub builds from a tagged release. For LOCAL testing you can instead
      # use:  - type: dir
      #         path: ..
      - type: git
        url: https://github.com/ZoutMax/fifine-control-deck-linux.git
        tag: v0.5.2
